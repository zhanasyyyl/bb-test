{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluebook</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.png' %}">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.css" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.js"></script>
  <script>
    var MQ = MathQuill.getInterface(2);
  </script>
</head>

<body class="{% block body_class %}{% endblock %}">
  <div class="window-frame">
    {% if not view_locked %}
    <header class="title-bar" id="windows-title-bar" style="display: none;">
      <div class="title-bar-left">
        <img src="/static/images/logo-white.svg" style="width: 15px; padding: 2px; background-color: #324dc7;" alt="">
        <span class="title-text">Bluebook</span>
      </div>
      <div class="title-bar-right">
        <span class="window-control minimize">—</span>
        <span class="window-control maximize">&#9744;</span>
        <a href="/quit" style="color: white; text-decoration: none;"><span
            class="window-control close">&#10005;</span></a>
      </div>
    </header>
    <script>
      (function () {
        var isWindows = navigator.platform.indexOf('Win') > -1 || navigator.userAgent.indexOf('Windows') > -1;
        if (isWindows) {
          document.getElementById('windows-title-bar').style.display = 'flex';
        }
      })();
    </script>
    {% endif %}

    <main class="content-area">
      {% block content %}
      {% endblock %}
    </main>
  </div>

  <script>
    // Prevent right-click context menu
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
    });

    // Prevent F12 developer tools
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F12') {
        e.preventDefault();
      }
    });

    // Prevent Ctrl+Shift+I
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
      }
    });

    // Prevent Ctrl+Shift+J
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'J') {
        e.preventDefault();
      }
    });

    // Prevent Ctrl+U
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'u') {
        e.preventDefault();
      }
    });
  </script>

  {% if preload_static_urls %}
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var staticUrlsToCache = {{ preload_static_urls|safe }};
        staticUrlsToCache.forEach(function (url) {
          fetch(url, { cache: 'force-cache' }).catch(function (e) { });
        });
      }, 500);
    });
  </script>
  {% endif %}
</body>

</html>
